<header class="header" id="header">
  <div class="header-left">
    <button class="header-btn back-btn" id="headerBackBtn" style="display: none;" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <img src="/wellnest-frontend/assets/images/logo.png" alt="WellNest" id="headerLogo" class="header-logo">
  </div>
  <div class="header-center">
    <h1 class="header-title" id="headerTitle" data-i18n="">Title</h1>
  </div>
  <div class="header-right">
    <button class="header-btn" id="headerNotificationBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
    </button>
  </div>
</header>
