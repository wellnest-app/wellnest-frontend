<script>
  // Handle sidebar logout with fallback
  function handleSidebarLogout() {
    try {
      if (typeof Auth !== 'undefined' && Auth.logout) {
        Auth.logout();
      } else if (typeof auth !== 'undefined' && auth.logout) {
        auth.logout();
      } else {
        // Fallback
        localStorage.removeItem('wellnest_token');
        localStorage.removeItem('wellnest_user');
        window.location.href = '/wellnest-frontend/pages/auth/login.html';
      }
    } catch (error) {
      console.error('[Sidebar Logout] Error:', error);
      localStorage.removeItem('wellnest_token');
      localStorage.removeItem('wellnest_user');
      window.location.href = '/wellnest-frontend/pages/auth/login.html';
    }
  }
</script>
