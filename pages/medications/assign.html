<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5B31A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <title>เพิ่มยา - WellNest</title>
  
  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#FFFBEB',
              100: '#FEF3C7',
              200: '#FDE68A',
              300: '#FCD34D',
              400: '#FBBF24',
              500: '#F5B31A',
              600: '#D97706',
              700: '#B45309',
              800: '#92400E',
              900: '#78350F'
            },
            secondary: {
              50: '#EFF6FF',
              100: '#DBEAFE',
              200: '#BFDBFE',
              300: '#93C5FD',
              400: '#60A5FA',
              500: '#3B82F6',
              600: '#2563EB',
              700: '#1D4ED8',
              800: '#1E40AF',
              900: '#1E3A8A'
            }
          },
          fontFamily: {
            sans: ['Noto Sans Thai', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/wellnest-frontend/css/tokens.css">
  <link rel="stylesheet" href="/wellnest-frontend/css/components.css">
  <link rel="stylesheet" href="/wellnest-frontend/css/utilities.css">
  
  <style>
    :root {
      --header-height: 56px;
      --bottom-nav-height: 0px;
    }
    
    /* ===== Page Container ===== */
    .page-container {
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: calc(var(--header-height) + env(safe-area-inset-top, 0px));
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
      background: var(--color-background, #FFFBEB);
    }
    
    /* ===== Header ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid #f0f0f0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      padding-top: env(safe-area-inset-top, 0px);
    }
    
    .header-left {
      width: 48px;
      display: flex;
      align-items: center;
    }
    
    .header-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-gray-600);
    }
    
    .header-btn:hover {
      background: var(--color-gray-100);
    }
    
    .header-btn svg {
      width: 22px;
      height: 22px;
    }
    
    .header-center {
      flex: 1;
      text-align: center;
    }
    
    .header-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--color-gray-800);
      margin: 0;
    }
    
    .header-right {
      width: 48px;
    }
    
    /* ===== Medication Info Card ===== */
    .med-info-card {
      background: white;
      margin: 1rem;
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      display: flex;
      gap: 0.75rem;
    }
    
    .med-info-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--color-primary-100);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .med-info-icon svg {
      width: 28px;
      height: 28px;
      color: var(--color-primary-600);
    }
    
    .med-info-content {
      flex: 1;
    }
    
    .med-info-name {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--color-gray-800);
      margin-bottom: 0.25rem;
    }
    
    .med-info-details {
      font-size: 0.875rem;
      color: var(--color-gray-600);
      margin-bottom: 0.375rem;
    }
    
    .med-info-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.125rem 0.5rem;
      border-radius: 1rem;
      background: var(--color-primary-100);
      color: var(--color-primary-700);
    }
    
    /* ===== Form Section ===== */
    .form-section {
      background: white;
      margin: 0 1rem 1rem;
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }
    
    .form-section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-gray-800);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .form-section-title svg {
      width: 20px;
      height: 20px;
      color: var(--color-primary-500);
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-group:last-child {
      margin-bottom: 0;
    }
    
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-gray-700);
      margin-bottom: 0.375rem;
    }
    
    .form-label .required {
      color: var(--color-error);
    }
    
    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 2px solid var(--color-gray-200);
      font-size: 1rem;
      transition: all 0.2s;
      background: white;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--color-primary-500);
    }
    
    .form-input::placeholder {
      color: var(--color-gray-400);
    }
    
    .form-input:disabled {
      background: var(--color-gray-100);
      cursor: not-allowed;
    }
    
    .form-select {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 2px solid var(--color-gray-200);
      font-size: 1rem;
      background: white;
      cursor: pointer;
    }
    
    .form-select:focus {
      outline: none;
      border-color: var(--color-primary-500);
    }
    
    .form-row {
      display: flex;
      gap: 0.75rem;
    }
    
    .form-row .form-group {
      flex: 1;
    }
    
    .form-hint {
      font-size: 0.75rem;
      color: var(--color-gray-500);
      margin-top: 0.25rem;
    }
    
    /* ===== Calculation Mode Selector ===== */
    .mode-selector {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    
    .mode-btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: 10px;
      border: 2px solid var(--color-gray-200);
      background: white;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-gray-600);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .mode-btn:hover {
      border-color: var(--color-primary-500);
    }
    
    .mode-btn.active {
      background: var(--color-primary-500);
      border-color: var(--color-primary-500);
      color: white;
    }
    
    .mode-btn-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.125rem;
    }
    
    .mode-btn-desc {
      font-size: 0.6875rem;
      opacity: 0.8;
    }
    
    /* ===== Calculated End Date Display ===== */
    .calculated-result {
      background: linear-gradient(135deg, var(--color-primary-50) 0%, var(--color-primary-100) 100%);
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
      border: 1px solid var(--color-primary-200);
    }
    
    .calculated-label {
      font-size: 0.75rem;
      color: var(--color-primary-700);
      margin-bottom: 0.25rem;
    }
    
    .calculated-value {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--color-primary-800);
    }
    
    .calculated-days {
      font-size: 0.8125rem;
      color: var(--color-primary-600);
      margin-top: 0.25rem;
    }
    
    /* ===== Notes Section ===== */
    .form-textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 2px solid var(--color-gray-200);
      font-size: 1rem;
      min-height: 80px;
      resize: vertical;
      transition: all 0.2s;
    }
    
    .form-textarea:focus {
      outline: none;
      border-color: var(--color-primary-500);
    }
    
    /* ===== Submit Button ===== */
    .submit-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
      background: white;
      border-top: 1px solid #f0f0f0;
      z-index: 100;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      width: 100%;
    }
    
    .btn-primary {
      background: var(--color-primary-500);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--color-primary-600);
    }
    
    .btn-primary:disabled {
      background: var(--color-gray-300);
      cursor: not-allowed;
    }
    
    .btn svg {
      width: 20px;
      height: 20px;
    }
    
    /* ===== Loading State ===== */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--color-primary-100);
      border-top-color: var(--color-primary-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: var(--color-gray-600);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="header-btn" onclick="history.back()" aria-label="กลับ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </div>
    <div class="header-center">
      <h1 class="header-title">เพิ่มยา</h1>
    </div>
    <div class="header-right"></div>
  </header>
  
  <!-- Page Content -->
  <div class="page-container">
    
    <!-- Medication Info Card -->
    <div class="med-info-card" id="medInfoCard">
      <div class="med-info-icon" id="medIcon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.5 20.5L3.5 13.5a4.95 4.95 0 1 1 7-7l7 7a4.95 4.95 0 0 1-7 7z"/>
          <path d="M8.5 8.5l7 7"/>
        </svg>
      </div>
      <div class="med-info-content">
        <div class="med-info-name" id="medName">กำลังโหลด...</div>
        <div class="med-info-details" id="medDetails"></div>
        <span class="med-info-badge" id="medBadge"></span>
      </div>
    </div>
    
    <!-- Form -->
    <form id="assignForm">
      
      <!-- Dosage Section -->
      <div class="form-section">
        <h2 class="form-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
          ขนาดยาที่สั่ง
        </h2>
        
        <div class="form-group">
          <label class="form-label">คำสั่งแพทย์ / วิธีใช้ <span class="required">*</span></label>
          <input type="text" 
                 class="form-input" 
                 name="prescribed_dosage" 
                 placeholder="เช่น 1 เม็ด วันละ 3 ครั้ง หลังอาหาร"
                 required>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">จำนวนต่อครั้ง</label>
            <input type="number" 
                   class="form-input" 
                   name="dosage_per_take" 
                   value="1"
                   min="0.25"
                   step="0.25"
                   placeholder="1">
          </div>
          <div class="form-group">
            <label class="form-label">หน่วย</label>
            <select class="form-select" name="dosage_unit">
              <option value="เม็ด">เม็ด</option>
              <option value="แคปซูล">แคปซูล</option>
              <option value="ช้อนชา">ช้อนชา</option>
              <option value="ช้อนโต๊ะ">ช้อนโต๊ะ</option>
              <option value="มล.">มล.</option>
              <option value="หยด">หยด</option>
              <option value="พัฟ">พัฟ</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">ความถี่ต่อวัน</label>
          <select class="form-select" name="frequency_per_day" id="frequencySelect">
            <option value="1">วันละ 1 ครั้ง</option>
            <option value="2">วันละ 2 ครั้ง</option>
            <option value="3" selected>วันละ 3 ครั้ง</option>
            <option value="4">วันละ 4 ครั้ง</option>
            <option value="6">วันละ 6 ครั้ง (ทุก 4 ชม.)</option>
          </select>
        </div>
      </div>
      
      <!-- Quantity & Duration Section -->
      <div class="form-section">
        <h2 class="form-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          จำนวนและระยะเวลา
        </h2>
        
        <!-- Calculation Mode -->
        <div class="mode-selector">
          <button type="button" class="mode-btn active" data-mode="auto" onclick="setMode('auto')">
            <span class="mode-btn-label">อัตโนมัติ</span>
            <span class="mode-btn-desc">คำนวณจากจำนวนยา</span>
          </button>
          <button type="button" class="mode-btn" data-mode="manual" onclick="setMode('manual')">
            <span class="mode-btn-label">กำหนดเอง</span>
            <span class="mode-btn-desc">ระบุวันเริ่ม-สิ้นสุด</span>
          </button>
          <button type="button" class="mode-btn" data-mode="continuous" onclick="setMode('continuous')">
            <span class="mode-btn-label">ต่อเนื่อง</span>
            <span class="mode-btn-desc">ไม่มีวันสิ้นสุด</span>
          </button>
        </div>
        
        <input type="hidden" name="calculation_mode" id="calculationMode" value="auto">
        
        <!-- Auto Mode Fields -->
        <div id="autoFields">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">จำนวนยาทั้งหมด</label>
              <input type="number" 
                     class="form-input" 
                     name="quantity" 
                     id="quantityInput"
                     min="1"
                     placeholder="เช่น 30"
                     oninput="calculateEndDate()">
            </div>
            <div class="form-group">
              <label class="form-label">หน่วย</label>
              <select class="form-select" name="quantity_unit">
                <option value="เม็ด">เม็ด</option>
                <option value="แคปซูล">แคปซูล</option>
                <option value="ขวด">ขวด</option>
                <option value="หลอด">หลอด</option>
                <option value="กล่อง">กล่อง</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">วันที่เริ่มต้น</label>
            <input type="date" 
                   class="form-input" 
                   name="start_date" 
                   id="startDateAuto"
                   oninput="calculateEndDate()">
          </div>
          
          <!-- Calculated End Date -->
          <div class="calculated-result" id="calculatedResult" style="display: none;">
            <div class="calculated-label">วันที่ยาหมด (คำนวณอัตโนมัติ)</div>
            <div class="calculated-value" id="calculatedEndDate">-</div>
            <div class="calculated-days" id="calculatedDays">-</div>
          </div>
        </div>
        
        <!-- Manual Mode Fields -->
        <div id="manualFields" style="display: none;">
          <div class="form-group">
            <label class="form-label">วันที่เริ่มต้น</label>
            <input type="date" class="form-input" name="start_date_manual" id="startDateManual">
          </div>
          <div class="form-group">
            <label class="form-label">วันที่สิ้นสุด</label>
            <input type="date" class="form-input" name="end_date" id="endDateManual">
          </div>
        </div>
        
        <!-- Continuous Mode Fields -->
        <div id="continuousFields" style="display: none;">
          <div class="form-group">
            <label class="form-label">วันที่เริ่มต้น</label>
            <input type="date" class="form-input" name="start_date_continuous" id="startDateContinuous">
          </div>
          <div class="form-hint" style="margin-top: 0.5rem; padding: 0.75rem; background: var(--color-info); background: #EFF6FF; border-radius: 8px; color: var(--color-secondary-700);">
            <strong>💊 ยาใช้ต่อเนื่อง:</strong> เหมาะสำหรับยาโรคเรื้อรังที่ต้องทานทุกวัน เช่น ยาความดัน ยาเบาหวาน
          </div>
        </div>
      </div>
      
      <!-- Notes Section -->
      <div class="form-section">
        <h2 class="form-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          หมายเหตุ (ไม่บังคับ)
        </h2>
        
        <div class="form-group">
          <textarea class="form-textarea" 
                    name="notes" 
                    placeholder="เช่น ทานพร้อมอาหาร, หลีกเลี่ยงแสงแดด"></textarea>
        </div>
      </div>
      
    </form>
  </div>
  
  <!-- Submit Button -->
  <div class="submit-section">
    <button type="submit" form="assignForm" class="btn btn-primary" id="submitBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      เพิ่มยาในรายการของฉัน
    </button>
  </div>
  
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay" style="display: none;">
    <div class="loading-spinner"></div>
    <div class="loading-text">กำลังบันทึก...</div>
  </div>
  
  <!-- Component Placeholders -->
  <div id="toast-placeholder"></div>
  <div id="modal-placeholder"></div>
  
  <!-- Core Scripts -->
  <script src="/wellnest-frontend/js/config.js"></script>
  <script src="/wellnest-frontend/js/i18n/th.js"></script>
  <script src="/wellnest-frontend/js/i18n/en.js"></script>
  <script src="/wellnest-frontend/js/i18n.js"></script>
  <script src="/wellnest-frontend/js/utils.js"></script>
  <script src="/wellnest-frontend/js/api.js"></script>
  <script src="/wellnest-frontend/js/auth.js"></script>
  <script src="/wellnest-frontend/js/storage.js"></script>
  <script src="/wellnest-frontend/js/components.js"></script>
  <script src="/wellnest-frontend/js/modal.js"></script>
  
  <script>
  document.addEventListener('DOMContentLoaded', async function() {
    // Require authentication
    if (typeof Auth !== 'undefined') {
      Auth.requireAuth();
    }
    
    // Load components
    await Components.init({
      toast: true,
      modal: true
    });
    
    // Get medication ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const medicationId = urlParams.get('med_id');
    
    if (!medicationId) {
      Toast.error('ไม่พบข้อมูลยา');
      setTimeout(() => {
        window.location.href = '/wellnest-frontend/pages/medications/catalog.html';
      }, 1500);
      return;
    }
    
    // State
    let medication = null;
    let currentMode = 'auto';
    
    // Elements
    const form = document.getElementById('assignForm');
    const submitBtn = document.getElementById('submitBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    // Initialize
    loadMedication(medicationId);
    setDefaultDates();
    
    // Load Medication Info
    async function loadMedication(id) {
      try {
        medication = await Api.get(`/medications/${id}`);
        renderMedicationInfo();
      } catch (error) {
        console.error('Failed to load medication:', error);
        Toast.error('ไม่พบข้อมูลยา');
        setTimeout(() => {
          window.location.href = '/wellnest-frontend/pages/medications/catalog.html';
        }, 1500);
      }
    }
    
    function renderMedicationInfo() {
      const formLabels = {
        tablet: 'เม็ด',
        capsule: 'แคปซูล',
        syrup: 'น้ำเชื่อม',
        injection: 'ฉีด',
        cream: 'ครีม',
        inhaler: 'พ่น',
        drop: 'หยด'
      };
      
      document.getElementById('medName').textContent = medication.medication_name;
      document.getElementById('medDetails').textContent = [
        medication.strength,
        medication.manufacturer
      ].filter(Boolean).join(' • ') || '';
      
      const badge = document.getElementById('medBadge');
      if (medication.dosage_form) {
        badge.textContent = formLabels[medication.dosage_form] || medication.dosage_form;
        badge.style.display = 'inline-flex';
      } else {
        badge.style.display = 'none';
      }
      
      // Set icon based on dosage form
      const iconColors = {
        tablet: { bg: '#FEF3C7', color: '#D97706' },
        capsule: { bg: '#DBEAFE', color: '#2563EB' },
        syrup: { bg: '#FCE7F3', color: '#BE185D' },
        cream: { bg: '#E0E7FF', color: '#4338CA' },
        injection: { bg: '#FEE2E2', color: '#DC2626' },
        inhaler: { bg: '#D1FAE5', color: '#059669' },
        drop: { bg: '#E0F2FE', color: '#0284C7' }
      };
      
      const colors = iconColors[medication.dosage_form] || iconColors.tablet;
      const icon = document.getElementById('medIcon');
      icon.style.background = colors.bg;
      icon.querySelector('svg').style.color = colors.color;
      
      // Set default unit based on dosage form
      if (medication.dosage_form === 'capsule') {
        document.querySelector('select[name="dosage_unit"]').value = 'แคปซูล';
        document.querySelector('select[name="quantity_unit"]').value = 'แคปซูล';
      } else if (medication.dosage_form === 'syrup') {
        document.querySelector('select[name="dosage_unit"]').value = 'ช้อนชา';
        document.querySelector('select[name="quantity_unit"]').value = 'ขวด';
      }
    }
    
    function setDefaultDates() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDateAuto').value = today;
      document.getElementById('startDateManual').value = today;
      document.getElementById('startDateContinuous').value = today;
      
      // Set default end date (2 weeks from today)
      const twoWeeks = new Date();
      twoWeeks.setDate(twoWeeks.getDate() + 14);
      document.getElementById('endDateManual').value = twoWeeks.toISOString().split('T')[0];
    }
    
    // Mode Switching
    window.setMode = function(mode) {
      currentMode = mode;
      document.getElementById('calculationMode').value = mode;
      
      // Update mode buttons
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      
      // Show/hide fields
      document.getElementById('autoFields').style.display = mode === 'auto' ? 'block' : 'none';
      document.getElementById('manualFields').style.display = mode === 'manual' ? 'block' : 'none';
      document.getElementById('continuousFields').style.display = mode === 'continuous' ? 'block' : 'none';
    };
    
    // Calculate End Date (Auto Mode)
    window.calculateEndDate = function() {
      const quantity = parseFloat(document.getElementById('quantityInput').value) || 0;
      const dosagePerTake = parseFloat(document.querySelector('input[name="dosage_per_take"]').value) || 1;
      const frequencyPerDay = parseInt(document.getElementById('frequencySelect').value) || 1;
      const startDate = document.getElementById('startDateAuto').value;
      
      const resultDiv = document.getElementById('calculatedResult');
      
      if (quantity > 0 && dosagePerTake > 0 && frequencyPerDay > 0 && startDate) {
        // Calculate days
        const totalDoses = Math.floor(quantity / dosagePerTake);
        const days = Math.ceil(totalDoses / frequencyPerDay);
        
        // Calculate end date
        const start = new Date(startDate);
        const end = new Date(start);
        end.setDate(start.getDate() + days - 1);
        
        // Format dates
        const thaiMonths = [
          'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
          'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'
        ];
        
        const endStr = `${end.getDate()} ${thaiMonths[end.getMonth()]} ${end.getFullYear() + 543}`;
        
        document.getElementById('calculatedEndDate').textContent = endStr;
        document.getElementById('calculatedDays').textContent = `รวม ${days} วัน (${totalDoses} โดส)`;
        resultDiv.style.display = 'block';
      } else {
        resultDiv.style.display = 'none';
      }
    };
    
    // Update calculation when frequency changes
    document.getElementById('frequencySelect').addEventListener('change', calculateEndDate);
    document.querySelector('input[name="dosage_per_take"]').addEventListener('input', calculateEndDate);
    
    // Form Submission
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const formData = new FormData(form);
      
      // Build request data
      const data = {
        medication_id: parseInt(medicationId),
        prescribed_dosage: formData.get('prescribed_dosage'),
        calculation_mode: currentMode
      };
      
      // Add optional fields
      const dosagePerTake = parseFloat(formData.get('dosage_per_take'));
      if (dosagePerTake) data.dosage_per_take = dosagePerTake;
      
      data.dosage_unit = formData.get('dosage_unit');
      data.frequency_per_day = parseInt(formData.get('frequency_per_day'));
      
      // Mode-specific fields
      if (currentMode === 'auto') {
        const quantity = parseFloat(formData.get('quantity'));
        if (quantity) {
          data.quantity = quantity;
          data.quantity_unit = formData.get('quantity_unit');
        }
        data.start_date = formData.get('start_date');
      } else if (currentMode === 'manual') {
        data.start_date = formData.get('start_date_manual');
        data.end_date = formData.get('end_date');
      } else if (currentMode === 'continuous') {
        data.start_date = formData.get('start_date_continuous');
      }
      
      // Notes
      const notes = formData.get('notes');
      if (notes) data.notes = notes;
      
      // Validate
      if (!data.prescribed_dosage) {
        Toast.error('กรุณากรอกคำสั่งแพทย์');
        return;
      }
      
      if (currentMode === 'auto' && !data.quantity) {
        Toast.error('กรุณากรอกจำนวนยา');
        return;
      }
      
      // Submit
      try {
        loadingOverlay.style.display = 'flex';
        submitBtn.disabled = true;
        
        await Api.post('/medications/assign', data);
        
        Toast.success(t('medications.messages.addSuccess'));
        
        // Redirect to medications list
        setTimeout(() => {
          window.location.href = '/wellnest-frontend/pages/medications/list.html';
        }, 1000);
        
      } catch (error) {
        console.error('Failed to assign medication:', error);
        Toast.error(error.message || t('errors.generic'));
        loadingOverlay.style.display = 'none';
        submitBtn.disabled = false;
      }
    });
  });
  </script>
</body>
