<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5B31A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <title>เข้าสู่ระบบ - WellNest</title>
  
  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#FFFBEB',
              100: '#FEF3C7',
              200: '#FDE68A',
              300: '#FCD34D',
              400: '#FBBF24',
              500: '#F5B31A',
              600: '#D97706',
              700: '#B45309',
              800: '#92400E',
              900: '#78350F'
            },
            secondary: {
              50: '#EFF6FF',
              100: '#DBEAFE',
              200: '#BFDBFE',
              300: '#93C5FD',
              400: '#60A5FA',
              500: '#3B82F6',
              600: '#2563EB',
              700: '#1D4ED8',
              800: '#1E40AF',
              900: '#1E3A8A'
            }
          },
          fontFamily: {
            sans: ['Noto Sans Thai', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/wellnest-frontend/css/tokens.css">
  <link rel="stylesheet" href="/wellnest-frontend/css/components.css">
  <link rel="stylesheet" href="/wellnest-frontend/css/utilities.css">
  
  <style>
    .auth-container {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(135deg, var(--color-primary-50) 0%, #FFF 50%, var(--color-secondary-50) 100%);
    }
    
    .auth-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo-container img {
      width: 120px;
      height: auto;
    }
    
    .input-group {
      margin-bottom: 1.25rem;
    }
    
    .input-group label {
      display: block;
      font-weight: 500;
      color: var(--color-gray-700);
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }
    
    .input-group .input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1.5px solid var(--color-gray-200);
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s;
      background: white;
    }
    
    .input-group .input:focus {
      outline: none;
      border-color: var(--color-primary-500);
      box-shadow: 0 0 0 3px rgba(245, 179, 26, 0.15);
    }
    
    .input-group .input.error {
      border-color: var(--color-error);
    }
    
    .input-group .input-error {
      color: var(--color-error);
      font-size: 0.75rem;
      margin-top: 0.375rem;
      display: none;
    }
    
    .input-group .input-error.show {
      display: block;
    }
    
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-gray-400);
      padding: 4px;
    }
    
    .password-toggle:hover {
      color: var(--color-gray-600);
    }
    
    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--color-primary-500) 0%, var(--color-primary-600) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(245, 179, 26, 0.4);
    }
    
    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .btn-login .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: var(--color-gray-400);
      font-size: 0.875rem;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-gray-200);
    }
    
    .divider span {
      padding: 0 1rem;
      background: white;
      position: relative;
      z-index: 1;
    }
    
    .register-link {
      text-align: center;
      color: var(--color-gray-600);
      font-size: 0.875rem;
    }
    
    .register-link a {
      color: var(--color-primary-600);
      font-weight: 600;
      text-decoration: none;
    }
    
    .register-link a:hover {
      text-decoration: underline;
    }
    
    .language-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    
    .lang-btn {
      padding: 0.5rem 1rem;
      border: 1.5px solid var(--color-gray-200);
      border-radius: 8px;
      background: white;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .lang-btn.active {
      background: var(--color-primary-500);
      border-color: var(--color-primary-500);
      color: white;
    }
    
    .alert {
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .alert.show {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      color: var(--color-success);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
  </style>
</head>
<body>
  <div class="auth-container flex items-center justify-center p-4 relative">
    <!-- Language Toggle -->
    <div class="language-toggle">
      <button class="lang-btn active" data-lang="th" onclick="switchLanguage('th')">🇹🇭 TH</button>
      <button class="lang-btn" data-lang="en" onclick="switchLanguage('en')">🇺🇸 EN</button>
    </div>
    
    <div class="auth-card">
      <!-- Logo -->
      <div class="logo-container">
        <img src="/wellnest-frontend/assets/images/logo.png" alt="WellNest" onerror="this.src='/assets/images/logo-placeholder.svg'">
        <h1 class="text-2xl font-bold text-gray-800 mt-4" data-i18n="common.appName">WellNest</h1>
        <p class="text-gray-500 text-sm mt-1" data-i18n="auth.welcomeBack">ยินดีต้อนรับกลับ</p>
      </div>
      
      <!-- Alert Message -->
      <div class="alert alert-error" id="alert-error">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span id="error-message"></span>
      </div>
      
      <!-- Login Form -->
      <form id="login-form" novalidate>
        <!-- Username -->
        <div class="input-group">
          <label for="username" data-i18n="auth.username">ชื่อผู้ใช้</label>
          <input 
            type="text" 
            id="username" 
            name="username"
            class="input" 
            data-i18n-placeholder="auth.username"
            placeholder="ชื่อผู้ใช้"
            autocomplete="username"
            required
          >
          <p class="input-error" id="username-error"></p>
        </div>
        
        <!-- Password -->
        <div class="input-group">
          <label for="password" data-i18n="auth.password">รหัสผ่าน</label>
          <div class="relative">
            <input 
              type="password" 
              id="password" 
              name="password"
              class="input pr-12" 
              data-i18n-placeholder="auth.password"
              placeholder="รหัสผ่าน"
              autocomplete="current-password"
              required
            >
            <button type="button" class="password-toggle" id="toggle-password" aria-label="แสดงรหัสผ่าน">
              <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <p class="input-error" id="password-error"></p>
        </div>
        
        <!-- Login Button -->
        <button type="submit" class="btn-login" id="btn-login">
          <span data-i18n="auth.login">เข้าสู่ระบบ</span>
        </button>
      </form>
      
      <!-- Divider -->
      <div class="divider">
        <span data-i18n="auth.noAccount">ยังไม่มีบัญชี?</span>
      </div>
      
      <!-- Register Link -->
      <p class="register-link">
        <a href="/wellnest-frontend/pages/auth/register.html" data-i18n="auth.createAccount">สร้างบัญชีใหม่</a>
      </p>
    </div>
  </div>
  
  <!-- Toast Placeholder -->
  <div id="toast-placeholder"></div>
  
  <!-- Core Scripts -->
  <script src="/wellnest-frontend/js/config.js"></script>
  <script src="/wellnest-frontend/js/components.js"></script>
  <script src="/wellnest-frontend/js/i18n/th.js"></script>
  <script src="/wellnest-frontend/js/i18n/en.js"></script>
  <script src="/wellnest-frontend/js/i18n.js"></script>
  <script src="/wellnest-frontend/js/utils.js"></script>
  <script src="/wellnest-frontend/js/api.js"></script>
  <script src="/wellnest-frontend/js/auth.js"></script>
  
  <script>
  // Wait for all scripts to load
  document.addEventListener('DOMContentLoaded', async function() {
    // Load components (only toast for auth pages)
    await Components.init({
      toast: true
    });
    
    // DOM Elements
    const form = document.getElementById('login-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const btnLogin = document.getElementById('btn-login');
    const alertError = document.getElementById('alert-error');
    const errorMessage = document.getElementById('error-message');
    const togglePassword = document.getElementById('toggle-password');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');
    
    // Check if already authenticated
    if (typeof Auth !== 'undefined' && Auth.isAuthenticated() && !Auth.isTokenExpired()) {
      window.location.replace('/wellnest-frontend/pages/dashboard.html');
      return;
    }
    
    // Password visibility toggle
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeOpen.style.display = isPassword ? 'none' : 'block';
      eyeClosed.style.display = isPassword ? 'block' : 'none';
    });
    
    // Initialize language buttons
    updateLanguageButtons(I18n.getLang());
    
    // Clear error on input
    [usernameInput, passwordInput].forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
        document.getElementById(`${input.id}-error`).classList.remove('show');
        hideError();
      });
    });
    
    // Show error
    function showError(message) {
      errorMessage.textContent = message;
      alertError.classList.add('show');
    }
    
    function hideError() {
      alertError.classList.remove('show');
    }
    
    // Show field error
    function showFieldError(fieldId, message) {
      const input = document.getElementById(fieldId);
      const error = document.getElementById(`${fieldId}-error`);
      if (input) input.classList.add('error');
      if (error) {
        error.textContent = message;
        error.classList.add('show');
      }
    }
    
    // Set loading state
    function setLoading(loading) {
      if (loading) {
        btnLogin.disabled = true;
        btnLogin.innerHTML = '<div class="spinner"></div><span>' + t('common.loading') + '</span>';
      } else {
        btnLogin.disabled = false;
        btnLogin.innerHTML = '<span data-i18n="auth.login">' + t('auth.login') + '</span>';
      }
    }
    
    // Validate form
    function validateForm() {
      let isValid = true;
      hideError();
      
      // Validate username
      const username = usernameInput.value.trim();
      if (!username) {
        showFieldError('username', t('validation.required'));
        isValid = false;
      } else if (!Auth.validateUsername(username).valid) {
        showFieldError('username', t('validation.invalidUsername'));
        isValid = false;
      }
      
      // Validate password
      const password = passwordInput.value;
      if (!password) {
        showFieldError('password', t('validation.required'));
        isValid = false;
      } else if (password.length < 6) {
        showFieldError('password', t('validation.minLength', { min: 6 }));
        isValid = false;
      }
      
      return isValid;
    }
    
    // Form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!validateForm()) return;
      
      setLoading(true);
      
      try {
        const result = await Auth.login(
          usernameInput.value.trim(),
          passwordInput.value
        );
        
        // Show success toast
        Toast.success(t('auth.loginSuccess'));
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.replace('/wellnest-frontend/pages/dashboard.html');
        }, 500);
        
      } catch (error) {
        console.error('Login error:', error);
        
        if (error.isUnauthorized && error.isUnauthorized()) {
          showError(t('auth.invalidCredentials'));
        } else if (error.isNetworkError && error.isNetworkError()) {
          showError(t('errors.network'));
        } else {
          showError(error.message || t('auth.loginFailed'));
        }
        
        // Haptic feedback on error
        if (typeof Utils !== 'undefined' && Utils.haptic) {
          Utils.haptic('error');
        }
        
      } finally {
        setLoading(false);
      }
    });
    
    // Handle Enter key
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        form.dispatchEvent(new Event('submit'));
      }
    });
  });
  
  // Language switching (global function for onclick)
  function switchLanguage(lang) {
    if (typeof I18n !== 'undefined') {
      I18n.setLang(lang);
      updateLanguageButtons(lang);
    }
  }
  
  function updateLanguageButtons(lang) {
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }
  </script>
</body>
</html>
