<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5B31A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="manifest" href="/wellnest-frontend/manifest.json">
  <link rel="apple-touch-icon" href="/wellnest-frontend/assets/icons/icon-192.png">
  <meta name="apple-mobile-web-app-title" content="WellNest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#FFFBEB',
              100: '#FEF3C7',
              200: '#FDE68A',
              300: '#FCD34D',
              400: '#FBBF24',
              500: '#F5B31A',
              600: '#D97706',
              700: '#B45309',
              800: '#92400E',
              900: '#78350F'
            },
            secondary: {
              50: '#EFF6FF',
              100: '#DBEAFE',

              300: '#93C5FD',
              400: '#60A5FA',
              500: '#3B82F6',
              600: '#2563EB',
              700: '#1D4ED8',
              800: '#1E40AF',

            }
          },

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/wellnest-frontend/css/tokens.css">
  <link rel="stylesheet" href="/wellnest-frontend/css/components.css">
  <link rel="stylesheet" href="/wellnest-frontend/css/utilities.css">
  
  <style>
    :root {
      --header-height: 56px;
      --bottom-nav-height: 64px;
    }
    
    /* ===== Page Container ===== */
    .page-container {
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: calc(var(--header-height) + env(safe-area-inset-top, 0px));
      padding-bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 80px);
      background: var(--color-background, #FFFBEB);
    }
    
    /* ===== Header ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid #f0f0f0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      padding-top: env(safe-area-inset-top, 0px);
    }
    
    .header-left {
      width: 48px;
      display: flex;
      align-items: center;
    }
    
    .header-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-gray-600);
    }
    
    .header-btn:hover {
      background: var(--color-gray-100);
    }
    
    .header-btn svg {
      width: 22px;
      height: 22px;
    }
    
    .header-center {
      flex: 1;
      text-align: center;
    }
    
    .header-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--color-gray-800);
      margin: 0;
    }
    
    .header-right {
      width: 48px;
      display: flex;
      justify-content: flex-end;
    }
    
    /* ===== Summary Card ===== */
    .summary-card {
      background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
      margin: 1rem;
      border-radius: 20px;
      padding: 1.25rem;
      color: white;
      position: relative;
      overflow: hidden;
    }
    
    .summary-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }
    
    .summary-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .summary-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .summary-icon svg {
      width: 28px;
      height: 28px;
    }
    
    .summary-text h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
    }
    
    .summary-text p {
      font-size: 0.875rem;
      opacity: 0.9;
      margin: 0.25rem 0 0;
    }
    
    /* ===== Filter Tabs ===== */
    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      padding: 0 1rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    
    .filter-tabs::-webkit-scrollbar {
      display: none;
    }
    
    .filter-tab {
      flex-shrink: 0;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: 1.5px solid var(--color-gray-200);
      background: white;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-gray-600);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    
    .filter-tab:hover {
      border-color: var(--color-gray-300);
    }
    
    .filter-tab.active {
      background: #3B82F6;
      border-color: #3B82F6;
      color: white;
    }
    
    .filter-tab .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 0 5px;
      background: rgba(0,0,0,0.08);
      color: var(--color-gray-600);
    }
    
    .filter-tab.active .badge {
      background: rgba(255,255,255,0.3);
      color: white;
    }
    
    /* ===== Date Group ===== */
    .date-group {
      margin-bottom: 1.25rem;
    }
    
    .date-group-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1rem;
      margin-bottom: 0.5rem;
    }
    
    .date-group-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--color-gray-500);
    }
    
    .date-group-line {
      flex: 1;
      height: 1px;
      background: var(--color-gray-200);
    }
    
    /* ===== Notification Card ===== */
    .notif-card {
      background: white;
      margin: 0 1rem 0.625rem;
      border-radius: 16px;
      padding: 0.875rem 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      transition: all 0.2s;
      position: relative;
    }
    
    .notif-card.unread {
      border-left: 3px solid #3B82F6;
    }
    
    .notif-card.acknowledged {
      opacity: 0.7;
    }
    
    /* Status icon */
    .notif-status-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .notif-status-icon svg {
      width: 22px;
      height: 22px;
    }
    
    .notif-status-icon.pending {
      background: #DBEAFE;
      color: #2563EB;
    }
    
    .notif-status-icon.taken {
      background: #DCFCE7;
      color: #16A34A;
    }
    
    .notif-status-icon.skipped {
      background: #FEF3C7;
      color: #D97706;
    }
    
    .notif-status-icon.failed {
      background: #FEE2E2;
      color: #DC2626;
    }
    
    /* Content */
    .notif-content {
      flex: 1;
      min-width: 0;
    }
    
    .notif-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-gray-800);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.125rem;
    }
    
    .notif-body {
      font-size: 0.8125rem;
      color: var(--color-gray-500);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }
    
    .notif-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
    }
    
    .notif-time {
      color: var(--color-gray-400);
    }
    
    .notif-response-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.125rem 0.5rem;
      border-radius: 8px;
      font-size: 0.6875rem;
      font-weight: 600;
    }
    
    .notif-response-badge.taken {
      background: #DCFCE7;
      color: #16A34A;
    }
    
    .notif-response-badge.skipped {
      background: #FEF3C7;
      color: #D97706;
    }
    
    .notif-response-badge.pending {
      background: #DBEAFE;
      color: #2563EB;
    }
    
    /* Action buttons */
    .notif-actions {
      display: flex;
      gap: 0.375rem;
      flex-shrink: 0;
      align-self: center;
    }
    
    .notif-action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .notif-action-btn svg {
      width: 16px;
      height: 16px;
    }
    
    .notif-action-btn.take {
      background: #DCFCE7;
      color: #16A34A;
    }
    
    .notif-action-btn.take:hover {
      background: #BBF7D0;
    }
    
    .notif-action-btn.skip {
      background: #FEF3C7;
      color: #D97706;
    }
    
    .notif-action-btn.skip:hover {
      background: #FDE68A;
    }
    
    .notif-action-btn.delete {
      background: #FEE2E2;
      color: #DC2626;
    }
    
    .notif-action-btn.delete:hover {
      background: #FECACA;
    }
    
    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
    }
    
    .empty-state svg {
      width: 80px;
      height: 80px;
      color: var(--color-gray-300);
      margin: 0 auto 1rem;
    }
    
    .empty-state h3 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--color-gray-700);
      margin-bottom: 0.5rem;
    }
    
    .empty-state p {
      font-size: 0.875rem;
      color: var(--color-gray-500);
      margin-bottom: 1.5rem;
    }
    
    /* ===== Loading Skeleton ===== */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 8px;
    }
    
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .skeleton-card {
      background: white;
      margin: 0 1rem 0.625rem;
      border-radius: 16px;
      padding: 0.875rem 1rem;
      display: flex;
      gap: 0.75rem;
    }
    
    .skeleton-icon { width: 42px; height: 42px; flex-shrink: 0; }
    .skeleton-content { flex: 1; }
    .skeleton-title { height: 18px; width: 55%; margin-bottom: 0.375rem; }
    .skeleton-text { height: 14px; width: 75%; margin-bottom: 0.375rem; }
    .skeleton-badge { height: 12px; width: 25%; }
    
    /* ===== Days Filter ===== */
    .days-select {
      padding: 0.375rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--color-gray-200);
      background: white;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--color-gray-600);
      cursor: pointer;
      outline: none;
    }
    
    .days-select:focus {
      border-color: #3B82F6;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="header-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>
    <div class="header-center">
      <h1 class="header-title">การแจ้งเตือน</h1>
    </div>
    <div class="header-right">
      <select class="days-select" id="daysFilter" onchange="changeDays(this.value)">
        <option value="7">7 วัน</option>

        <option value="30" selected>30 วัน</option>
        <option value="90">90 วัน</option>
      </select>
    </div>
  </header>
  
  <!-- Page Container -->
  <div class="page-container">
    <!-- Summary Card -->
    <div class="summary-card">
      <div class="summary-content">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        <div class="summary-text">
          <h2 id="summaryTotal">0 การแจ้งเตือน</h2>

      <button class="filter-tab" data-filter="pending" onclick="setFilter('pending')">

    <div id="loadingState">

          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-badge"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton skeleton-icon"></div>
        <div class="skeleton-content">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-badge"></div>
        </div>
      </div>

    <!-- Empty State -->
    <div id="emptyState" style="display: none;">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <h3 id="emptyTitle">ยังไม่มีการแจ้งเตือน</h3>
        <p id="emptyDesc">เมื่อระบบส่งการเตือนทานยา จะแสดงที่นี่</p>

  <!-- Component Placeholders -->
  <div id="bottom-nav-placeholder"></div>

  <!-- Core Scripts -->
  <script src="/wellnest-frontend/js/config.js"></script>
  <script src="/wellnest-frontend/js/i18n/th.js"></script>
  <script src="/wellnest-frontend/js/i18n/en.js"></script>
  <script src="/wellnest-frontend/js/i18n.js"></script>
  <script src="/wellnest-frontend/js/utils.js"></script>
  <script src="/wellnest-frontend/js/api.js"></script>
  <script src="/wellnest-frontend/js/auth.js"></script>
  <script src="/wellnest-frontend/js/storage.js"></script>
  <script src="/wellnest-frontend/js/components.js"></script>
  <script src="/wellnest-frontend/js/modal.js"></script>
  
  <script>
  document.addEventListener('DOMContentLoaded', async function() {
    // Require authentication
    if (typeof Auth !== 'undefined') {
      Auth.requireAuth();
    }
    
    // Load components — ไม่มี bottomNav active สำหรับ notifications (เข้าจาก dashboard กระดิ่ง)
    await Components.init({
      bottomNav: { active: '' },
      toast: true,
      modal: true
    });
    
    // State
    let notifications = [];
    let currentFilter = 'all';
    let currentDays = 30;
    
    // Elements
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const notifList = document.getElementById('notifList');
    const summaryTotal = document.getElementById('summaryTotal');
    const summaryPending = document.getElementById('summaryPending');
    const emptyTitle = document.getElementById('emptyTitle');
    const emptyDesc = document.getElementById('emptyDesc');
    
    // Load data
    loadNotifications();
    
    // ===== โหลดข้อมูล =====
    async function loadNotifications() {
      try {
        loadingState.style.display = 'block';
        emptyState.style.display = 'none';
        notifList.style.display = 'none';
        
        const data = await Api.get(`/notifications?days=${currentDays}&limit=200`);
        notifications = Array.isArray(data) ? data : [];
        
        loadingState.style.display = 'none';
        
        if (notifications.length === 0) {
          showEmptyState('ยังไม่มีการแจ้งเตือน', 'เมื่อระบบส่งการเตือนทานยา จะแสดงที่นี่');
        } else {
          notifList.style.display = 'block';
          updateCounts();
          renderNotifications();
        }
        
      } catch (error) {
        console.error('Failed to load notifications:', error);
        loadingState.style.display = 'none';
        showEmptyState('ไม่สามารถโหลดข้อมูลได้', 'กรุณาลองใหม่อีกครั้ง');
        Toast.error('ไม่สามารถโหลดข้อมูลได้');
      }
    }
    
    // ===== นับจำนวนแต่ละ filter =====
    function updateCounts() {
      const pending = notifications.filter(n => !n.response_type && n.notification_type === 'reminder').length;
      const taken = notifications.filter(n => n.response_type === 'taken').length;
      const skipped = notifications.filter(n => n.response_type === 'skipped').length;
      
      document.getElementById('countAll').textContent = notifications.length;
      document.getElementById('countPending').textContent = pending;
      document.getElementById('countTaken').textContent = taken;
      document.getElementById('countSkipped').textContent = skipped;
      
      // Summary card
      summaryTotal.textContent = `${notifications.length} การแจ้งเตือน`;
      summaryPending.textContent = `${pending} รอตอบกลับ`;
    }
    
    // ===== Filter notifications =====
    function getFilteredNotifications() {
      switch (currentFilter) {
        case 'pending':
          return notifications.filter(n => !n.response_type && n.notification_type === 'reminder');
        case 'taken':
          return notifications.filter(n => n.response_type === 'taken');
        case 'skipped':
          return notifications.filter(n => n.response_type === 'skipped');
        default:
          return notifications;
      }
    }
    
    // ===== จัดกลุ่มตามวัน =====
    function groupByDate(items) {
      const groups = {};
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      
      items.forEach(n => {
        const created = new Date(n.created_at);
        const dateKey = created.toISOString().split('T')[0];
        
        // สร้าง label วัน
        const nDate = new Date(created);
        nDate.setHours(0, 0, 0, 0);
        
        let label;
        if (nDate.getTime() === today.getTime()) {
          label = 'วันนี้';
        } else if (nDate.getTime() === yesterday.getTime()) {
          label = 'เมื่อวาน';
        } else {
          // แสดงวันที่ เช่น "20 มี.ค. 2569"
          label = formatThaiDate(created);
        }
        
        if (!groups[dateKey]) {
          groups[dateKey] = { label, items: [] };
        }
        groups[dateKey].items.push(n);
      });
      
      return groups;
    }
    
    // ===== Format วันที่ภาษาไทย =====
    function formatThaiDate(date) {
      const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      const d = new Date(date);
      const day = d.getDate();
      const month = months[d.getMonth()];
      const year = d.getFullYear() + 543; // พ.ศ.
      return `${day} ${month} ${year}`;
    }
    
    // ===== Format เวลา 24h =====
    function formatTime(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
    }
    
    // ===== ดึงชื่อยาจาก title =====
    function extractMedName(title) {
      // title format: "เวลาทานยา: วิตามินซี"
      if (!title) return 'ยา';
      const match = title.match(/เวลาทานยา:\s*(.+)/);
      return match ? match[1] : title;
    }
    
    // ===== Sanitize HTML =====
    function sanitizeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    // ===== Render =====
    function renderNotifications() {
      const filtered = getFilteredNotifications();
      
      if (filtered.length === 0) {
        notifList.style.display = 'none';
        const messages = {
          pending: ['ไม่มีรายการรอตอบกลับ', 'การแจ้งเตือนทั้งหมดได้รับการตอบกลับแล้ว'],
          taken: ['ไม่มีรายการที่ทานแล้ว', 'เมื่อคุณกดทานยา จะแสดงที่นี่'],
          skipped: ['ไม่มีรายการที่ข้ามแล้ว', 'เมื่อคุณกดข้าม จะแสดงที่นี่'],
          all: ['ยังไม่มีการแจ้งเตือน', 'เมื่อระบบส่งการเตือนทานยา จะแสดงที่นี่']
        };
        const msg = messages[currentFilter] || messages.all;
        showEmptyState(msg[0], msg[1]);
        return;
      }
      
      emptyState.style.display = 'none';
      notifList.style.display = 'block';
      
      // จัดกลุ่มตามวัน (sort ใหม่สุดก่อน)
      const sorted = [...filtered].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const groups = groupByDate(sorted);
      
      let html = '';
      
      // Sort groups by date descending
      const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
      
      sortedKeys.forEach(dateKey => {
        const group = groups[dateKey];
        html += `
          <div class="date-group">
            <div class="date-group-header">
              <span class="date-group-label">${sanitizeHTML(group.label)}</span>
              <div class="date-group-line"></div>
            </div>
            ${group.items.map(n => createNotifCard(n)).join('')}
          </div>
        `;
      });
      
      notifList.innerHTML = html;
    }
    
    // ===== สร้าง Notification Card =====
    function createNotifCard(n) {
      const isPending = !n.response_type && n.notification_type === 'reminder';
      const statusClass = n.response_type || (n.status === 'failed' ? 'failed' : 'pending');
      const medName = sanitizeHTML(extractMedName(n.title));
      const timeStr = formatTime(n.created_at);
      
      // Icon ตาม status
      const iconMap = {
        taken: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
        skipped: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
        failed: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        pending: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>'
      };
      
      // Badge ตอบกลับ
      let badgeHtml = '';
      if (n.response_type === 'taken') {
        badgeHtml = '<span class="notif-response-badge taken">ทานแล้ว</span>';
      } else if (n.response_type === 'skipped') {
        badgeHtml = '<span class="notif-response-badge skipped">ข้ามแล้ว</span>';
      } else if (isPending) {
        badgeHtml = '<span class="notif-response-badge pending">รอตอบกลับ</span>';
      }
      
      // Action buttons — แสดงเฉพาะ pending
      let actionsHtml = '';
      if (isPending) {
        actionsHtml = `
          <div class="notif-actions">
            <button class="notif-action-btn take" onclick="event.stopPropagation(); acknowledgeNotif(${n.notification_id}, 'taken')" title="ทานแล้ว">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="notif-action-btn skip" onclick="event.stopPropagation(); acknowledgeNotif(${n.notification_id}, 'skipped')" title="ข้าม">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        `;
      } else {
        actionsHtml = `
          <div class="notif-actions">
            <button class="notif-action-btn delete" onclick="event.stopPropagation(); confirmDeleteNotif(${n.notification_id})" title="ลบ">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        `;
      }
      
      const cardClass = isPending ? 'unread' : (n.response_type ? 'acknowledged' : '');
      
      return `
        <div class="notif-card ${cardClass}">
          <div class="notif-status-icon ${statusClass}">
            ${iconMap[statusClass] || iconMap.pending}
          </div>
          <div class="notif-content">
            <div class="notif-title">${medName}</div>
            <div class="notif-body">${sanitizeHTML(n.body) || ''}</div>
            <div class="notif-meta">
              <span class="notif-time">${timeStr}</span>
              ${badgeHtml}
            </div>
          </div>
          ${actionsHtml}
        </div>
      `;
    }
    
    // ===== Empty State Helper =====
    function showEmptyState(title, desc) {
      emptyTitle.textContent = title;
      emptyDesc.textContent = desc;
      emptyState.style.display = 'block';
      notifList.style.display = 'none';
    }
    
    // ===== Actions =====
    
    // 10A-1c: Acknowledge notification (taken / skipped)
    // "ทานแล้ว" → GET detail → POST /medication/take → POST /acknowledge
    // "ข้าม" → POST /acknowledge ตรงๆ
    window.acknowledgeNotif = async function(notifId, responseType) {
      // ป้องกันกดซ้ำ — disable ปุ่มทันที
      const card = document.querySelector(`.notif-card .notif-action-btn[onclick*="${notifId}"]`);
      const allBtns = card ? card.closest('.notif-actions')?.querySelectorAll('.notif-action-btn') : [];
      allBtns.forEach(btn => { btn.disabled = true; btn.style.opacity = '0.5'; });
      
      try {
        if (responseType === 'taken') {
          // === Flow "ทานแล้ว" — ต้องสร้าง MedicationHistory ด้วย ===
          
          // Step 1: ดึง notification detail เพื่อได้ user_med_id, reminder_id, reminder_time
          let detail = null;
          try {
            detail = await Api.get(`/notifications/${notifId}`);
          } catch (detailErr) {
            console.error('[Notifications] Failed to get detail:', detailErr);
          }
          
          // Step 2: เรียก /medication/take ถ้ามีข้อมูลครบ
          if (detail && detail.user_med_id && detail.reminder_id) {
            try {
              await Api.post('/medication/take', {
                user_med_id: detail.user_med_id,
                reminder_id: detail.reminder_id,
                scheduled_time: detail.reminder_time || null,
                action: 'taken'
              });
            } catch (takeErr) {
              // ถ้า duplicate (กดจากหน้าอื่นไปแล้ว) → ไม่ต้อง error
              console.warn('[Notifications] Take result:', takeErr.message || takeErr);
            }
          } else {
            console.warn('[Notifications] Missing user_med_id or reminder_id — skip /medication/take');
          }
          
          // Step 3: mark notification as acknowledged
          // อาจ 400 เพราะ B1b ใน /medication/take mark ไปแล้ว → ignore
          try {
            await Api.post(`/notifications/${notifId}/acknowledge`, {
              response_type: 'taken'
            });
          } catch (ackErr) {
            // B1b อาจ mark ไปแล้ว → 400 "already acknowledged" → ไม่เป็นไร
            console.log('[Notifications] Acknowledge after take:', ackErr.message || 'already marked');
          }
          
        } else {
          // === Flow "ข้าม" — mark notification เท่านั้น ===
          await Api.post(`/notifications/${notifId}/acknowledge`, {
            response_type: responseType
          });
        }
        
        // อัปเดต local state
        const notif = notifications.find(n => n.notification_id === notifId);
        if (notif) {
          notif.response_type = responseType;
          notif.notification_type = 'acknowledged';
        }
        
        const label = responseType === 'taken' ? 'บันทึกทานยาแล้ว' : 'ข้ามการเตือนแล้ว';
        Toast.success(label);
        
        updateCounts();
        renderNotifications();
        
      } catch (error) {
        console.error('Failed to acknowledge:', error);
        const msg = error.detail || error.message || 'เกิดข้อผิดพลาด';
        Toast.error(msg);
        // คืนสถานะปุ่ม
        allBtns.forEach(btn => { btn.disabled = false; btn.style.opacity = '1'; });
      }
    };
    
    // Confirm delete
    window.confirmDeleteNotif = function(notifId) {
      Modal.show({
        title: 'ลบการแจ้งเตือน',
        content: `
          <p style="color: var(--color-gray-600); margin-bottom: 1rem;">
            ต้องการลบการแจ้งเตือนนี้หรือไม่?
          </p>
          <p style="font-size: 0.875rem; color: var(--color-gray-500);">
            การดำเนินการนี้ไม่สามารถย้อนกลับได้
          </p>
        `,
        actions: [
          {
            label: 'ยกเลิก',
            class: 'btn-outline',
            onclick: "Modal.close()"
          },
          {
            label: 'ลบ',
            class: 'btn-danger',
            onclick: `deleteNotif(${notifId})`
          }
        ]
      });
    };
    
    // Delete notification
    window.deleteNotif = async function(notifId) {
      try {
        await Api.delete(`/notifications/${notifId}`);
        Modal.close();
        Toast.success('ลบการแจ้งเตือนสำเร็จ');
        
        // Update local state
        notifications = notifications.filter(n => n.notification_id !== notifId);
        
        if (notifications.length === 0) {
          showEmptyState('ยังไม่มีการแจ้งเตือน', 'เมื่อระบบส่งการเตือนทานยา จะแสดงที่นี่');
        }
        
        updateCounts();
        renderNotifications();
        
      } catch (error) {
        console.error('Failed to delete notification:', error);
        Modal.close();
        Toast.error(error.message || 'เกิดข้อผิดพลาด');
      }
    };
    
    // Set filter
    window.setFilter = function(filter) {
      currentFilter = filter;
      
      // Update tab UI
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.filter === filter);
      });
      
      renderNotifications();
    };
    
    // Change days
    window.changeDays = function(days) {
      currentDays = parseInt(days);
      loadNotifications();
    };
  });
  </script>
</body>
</html>
